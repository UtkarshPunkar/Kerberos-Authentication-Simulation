<!DOCTYPE html>
<html>
<head>
    <title>Kerberos Workflow</title>
    <link rel="stylesheet" href="/static/style.css">
    {% if success %}
    <meta http-equiv="refresh" content="10;url=/service/{{username}}">
    {% endif %}
</head>
<body>
    <div class="center-container">
        <h1>Kerberos Workflow Steps</h1>
        <ol>
            {% for step in steps %}
                <li>{{ step }}</li>
            {% endfor %}
        </ol>

        {% if success %}
        <div class="loading-screen">
            <h2>🔒 Establishing Secure Connection...</h2>
            <div class="loader"></div>
            <p>Redirecting to Service Server in <span id="countdown">10</span> seconds...</p>
        </div>
        <script>
            let count = 10;
            let timer = setInterval(() => {
                count--;
                document.getElementById("countdown").innerText = count;
                if (count <= 0) clearInterval(timer);
            }, 1000);
        </script>
        {% else %}
            <a href="/">🔄 Try Again</a>
        {% endif %}
    </div>
</body>
</html>
